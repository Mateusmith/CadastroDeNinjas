<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title>Tabela de Ninjas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #e2e8f0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1::before {
            content: "⚔️";
            font-size: 28px;
        }

        .btn-adicionar {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 10px;
            color: white;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .btn-adicionar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
        }

        .table-wrapper {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(15, 23, 42, 0.6);
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        td {
            padding: 14px 16px;
            font-size: 14px;
            color: #cbd5e1;
            border-bottom: 1px solid rgba(148, 163, 184, 0.06);
            vertical-align: middle;
        }

        tr:hover td {
            background: rgba(148, 163, 184, 0.05);
        }

        tr:last-child td {
            border-bottom: none;
        }

        td img {
            border-radius: 50%;
            border: 2px solid rgba(148, 163, 184, 0.2);
            object-fit: cover;
        }

        .ninja-name {
            font-weight: 600;
            color: #f1f5f9;
        }

        .rank-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .missao-text {
            font-size: 13px;
            color: #94a3b8;
        }

        .missao-text em {
            color: #64748b;
            font-style: normal;
        }

        .actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .actions a {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-detalhes {
            background: rgba(59, 130, 246, 0.15);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .btn-detalhes:hover {
            background: rgba(59, 130, 246, 0.25);
        }

        .btn-alterar {
            background: rgba(234, 179, 8, 0.15);
            color: #fde047;
            border: 1px solid rgba(234, 179, 8, 0.2);
        }
        .btn-alterar:hover {
            background: rgba(234, 179, 8, 0.25);
        }

        .btn-deletar {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .btn-deletar:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 16px; text-align: center; }
            table { font-size: 13px; }
            th, td { padding: 10px 8px; }
            .actions { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Lista de Ninjas</h1>
        <a class="btn-adicionar" th:href="@{/ninjas/ui/adicionar}">＋ Adicionar Ninja</a>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>Id</th>
                <th>Imagem</th>
                <th>Nome</th>
                <th>Idade</th>
                <th>Email</th>
                <th>Rank</th>
                <th>Missões</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="ninja : ${ninjas}">
                <td th:text="${ninja.id}"></td>
                <td><img th:src="${ninja.imgUrl}" width="48" height="48" /></td>
                <td class="ninja-name" th:text="${ninja.nome}"></td>
                <td th:text="${ninja.idade}"></td>
                <td th:text="${ninja.email}"></td>
                <td><span class="rank-badge" th:text="${ninja.rank}"></span></td>
                <td>
                    <span th:if="${ninja.missoes}" class="missao-text">
                        <span th:text="${ninja.missoes.nome}"></span> <em>• Dificuldade: <span th:text="${ninja.missoes.dificuldade}"></span></em>
                    </span>
                    <span th:if="${ninja.missoes == null}" class="missao-text" style="color:#64748b;">Sem missões</span>
                </td>
                <td>
                    <div class="actions">
                        <a class="btn-detalhes" th:href="@{/ninjas/ui/listar/{id}(id=${ninja.id})}">Detalhes</a>
                        <a class="btn-alterar" th:href="@{/ninjas/ui/#/{id}(id=${ninja.id})}">Alterar</a>
                        <a class="btn-deletar" th:href="@{/ninjas/ui/deletar/{id}(id=${ninja.id})}">Deletar</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
