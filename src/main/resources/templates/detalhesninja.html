<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalhes do Ninja</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .detail-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 600px;
        }

        .profile-section {
            text-align: center;
            margin-bottom: 28px;
        }

        .profile-section img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid rgba(99, 102, 241, 0.4);
            object-fit: cover;
            margin-bottom: 16px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .profile-section h2 {
            font-size: 22px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 4px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 28px;
        }

        .info-item {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid rgba(148, 163, 184, 0.08);
        }

        .info-item .info-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 4px;
        }

        .info-item .info-value {
            font-size: 15px;
            font-weight: 500;
            color: #e2e8f0;
        }

        .rank-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        h3 {
            font-size: 16px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h3::before { content: "📜"; }

        .missions-table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
        }

        .missions-table th {
            background: rgba(15, 23, 42, 0.6);
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 12px 16px;
            text-align: left;
        }

        .missions-table td {
            padding: 12px 16px;
            font-size: 14px;
            color: #cbd5e1;
            border-bottom: 1px solid rgba(148, 163, 184, 0.06);
        }

        .missions-table tr:last-child td { border-bottom: none; }
        .missions-table tr:hover td { background: rgba(148, 163, 184, 0.05); }

        .missions-wrapper {
            background: rgba(15, 23, 42, 0.4);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.08);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 28px;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 10px;
            color: #94a3b8;
            background: rgba(148, 163, 184, 0.1);
            border: 1px solid rgba(148, 163, 184, 0.15);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(148, 163, 184, 0.15);
            color: #e2e8f0;
        }

        @media (max-width: 500px) {
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="detail-card">
    <div class="profile-section">
        <img th:src="${ninja.imgUrl}" th:alt="${ninja.nome}" />
        <h2 th:text="${ninja.nome}"></h2>
    </div>

    <div class="info-grid">
        <div class="info-item">
            <div class="info-label">Email</div>
            <div class="info-value" th:text="${ninja.email}"></div>
        </div>
        <div class="info-item">
            <div class="info-label">Idade</div>
            <div class="info-value" th:text="${ninja.idade}"></div>
        </div>
        <div class="info-item">
            <div class="info-label">Rank</div>
            <div class="info-value"><span class="rank-badge" th:text="${ninja.rank}"></span></div>
        </div>
    </div>

    <h3>Missões</h3>
    <div class="missions-wrapper">
        <table class="missions-table">
            <thead>
            <tr>
                <th>Nome</th>
                <th>Dificuldade</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="missao : ${ninja.missoes}">
                <td th:text="${missao.nome}"></td>
                <td th:text="${missao.dificuldade}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <a class="back-btn" href="/ninjas/ui/listar">← Voltar para a lista</a>
</div>
</body>
</html>
