# Nome da aplicação
spring.application.name=CadastroDeNinjas

# ???????????????????????????????????????????
# CONFIGURAÇÕES DO BANCO DE DADOS H2
# ???????????????????????????????????????????

# URL de conexão com o H2 em memória
# jdbc:h2:mem:NOME_DO_BANCO ? banco fica na RAM
# DB_CLOSE_ON_EXIT=FALSE    ? não apaga ao fechar a aplicação
# DB_CLOSE_DELAY=-1         ? mantém o banco enquanto a JVM estiver ativa
spring.datasource.url=${DATABASE_URL}
# Usuário e senha do banco (pode criar o que quiser)
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Driver do H2 ? classe que conecta Java ao banco
spring.datasource.driver-class-name=org.h2.Driver

# ???????????????????????????????????????????
# CONSOLE DO H2 (interface visual no navegador)
# ???????????????????????????????????????????

# Habilita o console em: http://localhost:8080/h2-console
spring.h2.console.enabled=true

# ???????????????????????????????????????????
# CONFIGURAÇÕES DO JPA / HIBERNATE
# ???????????????????????????????????????????

# update ? Hibernate atualiza a tabela automaticamente quando o Model muda
# create ? recria a tabela do zero a cada reinício (cuidado: apaga dados)
# validate ? só valida, não altera nada
# none ? desativa o comportamento automático
spring.jpa.hibernate.ddl-auto=update

# Mostra no console cada query SQL executada ? ótimo para aprender e debugar
spring.jpa.show-sql=true

# Formata o SQL para ficar legível no console
spring.jpa.properties.hibernate.format_sql=true

# Configurar o flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations
spring.flyway.baseline-on-migrate=true